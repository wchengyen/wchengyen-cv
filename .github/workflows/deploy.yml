name: Deploy to GitHub Pages

# This workflow builds the site and pushes the contents of `dist/` to the
# `gh-pages` branch, which GitHub Pages serves as the public site.
#
# Setup (one-time, in the GitHub UI):
#   1. Settings → Pages
#   2. Source: "Deploy from a branch"
#   3. Branch: `gh-pages` / `(root)`
#   4. Save. Subsequent pushes to `main` rebuild automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

# `contents: write` is required to push to the gh-pages branch.
# `pages: write` lets the run update the Pages deployment status.
permissions:
  contents: write
  pages: write

# Prevent concurrent deploys from clobbering each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Create a clean, single-commit history for gh-pages
          force_orphan: true
          # Use the GitHub Actions bot as the author of the gh-pages commit
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          # Quiet noisy git output
          disable_nojekyll: false
